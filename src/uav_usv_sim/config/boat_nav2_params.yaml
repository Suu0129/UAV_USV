boat_nav2_interface:
  ros__parameters:
    # Nav2 sends desired body velocities; this loop tracks them using Gazebo pose feedback.
    control_frequency: 20.0
    enable_velocity_pid: true
    linear_kp: 0.18
    linear_ki: 0.05
    linear_kd: 0.01
    linear_integral_limit: 0.5
    angular_kp: 0.28
    angular_ki: 0.04
    angular_kd: 0.015
    angular_integral_limit: 0.8
    derivative_filter_alpha: 0.2
    velocity_measurement_alpha: 0.3
    linear_setpoint_alpha: 0.45
    angular_setpoint_alpha: 0.6
    max_linear_output: 1.4
    max_angular_output: 2.2
    command_deadband: 0.01

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: landing_boat/base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 1.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.7
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 1.8
      yaw_goal_tolerance: 3.14

    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 100
      model_dt: 0.05
      batch_size: 1800
      iteration_count: 1
      vx_std: 0.45
      vy_std: 0.0
      wz_std: 0.75
      vx_max: 1.25
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 2.1
      ax_max: 0.6
      ax_min: -0.8
      ay_min: 0.0
      ay_max: 0.0
      az_max: 3.2
      temperature: 0.3
      gamma: 0.015
      motion_model: DiffDrive
      DiffDrive:
        plugin: mppi::DiffDriveMotionModel
      visualize: true
      critic_index_to_visualize: 0
      reset_period: 1.0
      regenerate_noises: false
      prune_distance: 8.0
      transform_tolerance: 0.5
      TrajectoryVisualizer:
        trajectory_step: 8
        time_step: 4
      critics: [ConstraintCritic, CostCritic, GoalCritic, PathAlignCritic, PathFollowCritic, PathAngleCritic, PreferForwardCritic]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.8
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 2.0
        trajectory_point_step: 3
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 6.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.12
        trajectory_point_step: 5
        threshold_to_consider: 7.0
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        offset_from_furthest: 6
        threshold_to_consider: 6.0
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 4.0
        max_angle_to_furthest: 1.2
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 1.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: landing_boat/base_link
      rolling_window: true
      width: 70
      height: 70
      resolution: 0.25
      robot_radius: 1.8
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /boat/scan
          max_obstacle_height: 6.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 80.0
          raytrace_min_range: 0.0
          obstacle_max_range: 45.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.2
        inflation_radius: 3.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: landing_boat/base_link
      robot_radius: 1.8
      resolution: 0.5
      track_unknown_space: false
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /boat/scan
          max_obstacle_height: 6.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 80.0
          raytrace_min_range: 0.0
          obstacle_max_range: 45.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.2
        inflation_radius: 3.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 2.0
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: landing_boat/base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.4

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [1.25, 0.0, 2.1]
    min_velocity: [0.0, 0.0, -2.1]
    max_accel: [0.6, 0.0, 3.2]
    max_decel: [-0.8, 0.0, -3.4]
    odom_topic: /odom
    odom_duration: 0.2
    deadband_velocity: [0.02, 0.0, 0.02]
    velocity_timeout: 1.0
